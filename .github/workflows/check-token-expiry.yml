name: Check Meta Token Expiry

on:
  schedule:
    # 매일 오전 9시 KST (UTC 0시)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-token:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install certifi

      - name: Create .env from secrets
        run: |
          cat > .env << 'ENVEOF'
          META_APP_ID="${{ secrets.META_APP_ID }}"
          META_APP_SECRET="${{ secrets.META_APP_SECRET }}"
          META_ACCESS_TOKEN="${{ secrets.META_ACCESS_TOKEN }}"
          SMTP_HOST="smtp.gmail.com"
          SMTP_PORT="587"
          SMTP_USER="${{ secrets.SMTP_USER }}"
          SMTP_PASS="${{ secrets.SMTP_PASS }}"
          EMAIL_FROM="${{ secrets.SMTP_USER }}"
          EMAIL_TO="${{ secrets.EMAIL_TO }}"
          ENVEOF

      - name: Check token expiry
        run: python3 scripts/check_token_expiry.py --warn-days 7

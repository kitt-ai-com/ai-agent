name: Daily Report - 미친특가

on:
  schedule:
    # 매일 오전 9시 KST (UTC 0시)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install pandas numpy certifi

      - name: Install Node dependencies
        run: npm install

      - name: Create .env from secrets
        run: |
          cat > .env << 'ENVEOF'
          META_APP_ID="${{ secrets.META_APP_ID }}"
          META_APP_SECRET="${{ secrets.META_APP_SECRET }}"
          META_ACCESS_TOKEN="${{ secrets.META_ACCESS_TOKEN }}"
          NOTION_TOKEN="${{ secrets.NOTION_TOKEN }}"
          NOTION_PAGE_ID_MARKETING="${{ secrets.NOTION_PAGE_ID_MARKETING }}"
          SMTP_HOST="smtp.gmail.com"
          SMTP_PORT="587"
          SMTP_USER="${{ secrets.SMTP_USER }}"
          SMTP_PASS="${{ secrets.SMTP_PASS }}"
          EMAIL_FROM="${{ secrets.SMTP_USER }}"
          EMAIL_TO="${{ secrets.EMAIL_TO }}"
          ENVEOF

      - name: Fetch + Analyze + Notion + Email
        run: python3 scripts/daily_michinteukga.py

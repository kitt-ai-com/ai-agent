name: Weekly Meta Ad Report

on:
  schedule:
    # 매주 월요일 오전 9시 KST (UTC 0시)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas numpy certifi

      - name: Create .env from secrets
        run: |
          cat > .env << 'ENVEOF'
          META_APP_ID="${{ secrets.META_APP_ID }}"
          META_APP_SECRET="${{ secrets.META_APP_SECRET }}"
          META_ACCESS_TOKEN="${{ secrets.META_ACCESS_TOKEN }}"
          SMTP_HOST="smtp.gmail.com"
          SMTP_PORT="587"
          SMTP_USER="${{ secrets.SMTP_USER }}"
          SMTP_PASS="${{ secrets.SMTP_PASS }}"
          EMAIL_FROM="${{ secrets.SMTP_USER }}"
          EMAIL_TO="${{ secrets.EMAIL_TO }}"
          ENVEOF

      - name: Fetch & Analyze & Email
        run: python3 scripts/weekly_report.py --fetch --email

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meta-ad-reports-${{ github.run_number }}
          path: output/meta-ad/
          retention-days: 30
